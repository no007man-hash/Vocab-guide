<style>
  :root {
    --paper: #FAF6EF;
    --paper-card: #FFFDF8;

    --pencil: #8B8680;
    --red: #B23A48;
    --red-soft: #D98B92;
    --sage: #7C9885;
    --rule: #DAD2C0;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background-image: radial-gradient(circle at 1px 1px, rgba(31,41,55,0.035) 1px, transparent 0);
    background-size: 18px 18px;
  }
  #root { min-height: 100vh; }
  .app {
    max-width: 480px; margin: 0 auto; min-height: 100vh;
    display: flex; flex-direction: column;
    padding: 20px 18px 40px;
  }
  .header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid var(--rule);
  }
  .brand {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 26px; font-weight: 700; letter-spacing: -0.01em; color: var(--ink);
  }
  .brand span { color: var(--red); }
  .tagline {
    font-size: 11px; color: var(--pencil); text-transform: uppercase;
    letter-spacing: 0.08em; margin-top: 2px;
  }
  .stat-pill {
    font-size: 12px; color: var(--ink-soft); background: var(--paper-card);
    border: 1px solid var(--rule); border-radius: 20px; padding: 5px 12px; white-space: nowrap;
  }
  .tabs { display: flex; gap: 6px; margin-bottom: 20px; }
  .tab {
    flex: 1; padding: 9px 6px; text-align: center; font-size: 13px; font-weight: 600;
    border: 1px solid var(--rule); background: var(--paper-card); color: var(--ink-soft);
    border-radius: 9px; cursor: pointer; transition: all 0.15s ease;
  }
  .tab.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .tab:focus-visible, button:focus-visible, .choice:focus-visible { outline: 2px solid var(--red); outline-offset: 2px; }
  .batch-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 16px; scrollbar-width: thin; }
  .batch-chip {
    flex: 0 0 auto; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--rule);
    background: var(--paper-card); font-size: 12.5px; font-weight: 600; color: var(--ink-soft);
    cursor: pointer; white-space: nowrap;
  }
  .batch-chip.active { background: var(--red); border-color: var(--red); color: #fff; }
  .batch-chip .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--sage); margin-left: 6px; vertical-align: middle;
  }
  .card-zone { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .progress-line { width: 100%; display: flex; justify-content: space-between; font-size: 12px; color: var(--pencil); margin-bottom: 10px; }
  .progress-track { width: 100%; height: 4px; background: var(--rule); border-radius: 4px; margin-bottom: 22px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--red); border-radius: 4px; transition: width 0.3s ease; }
  .card-scene { width: 100%; max-width: 360px; height: 320px; perspective: 1400px; margin-bottom: 22px; }
  .card-flip {
    width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(.4,.2,.2,1); cursor: pointer;
  }
  .card-flip.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0; backface-visibility: hidden; border-radius: 4px;
    background: var(--paper-card);
    box-shadow: 0 1px 0 #fff, 0 2px 0 var(--rule), 0 8px 16px -8px rgba(31,41,55,0.25);
    padding: 28px 26px; display: flex; flex-direction: column; border: 1px solid var(--rule);
  }
  .card-tab {
    position: absolute; top: -1px; right: 22px; background: var(--sage); color: #fff;
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 4px 10px 5px; border-radius: 0 0 6px 6px;
  }
  .card-face.back { transform: rotateY(180deg); }
  .card-index-no { font-size: 11px; color: var(--pencil); margin-top: 4px; }
  .card-word { font-family: Georgia, 'Times New Roman', serif; font-size: 38px; font-weight: 700; color: var(--ink); line-height: 1.1; margin-top: 28px; }
  .card-pos { font-size: 13px; font-style: italic; color: var(--red); margin-top: 8px; }
  .card-hint { margin-top: auto; font-size: 11.5px; color: var(--pencil); text-align: center; text-transform: uppercase; letter-spacing: 0.05em; }
  .card-meaning-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--sage); font-weight: 700; margin-top: 30px; }
  .card-meaning { font-size: 19px; color: var(--ink); margin-top: 8px; line-height: 1.35; font-weight: 500; }
  .card-example { font-size: 14px; color: var(--ink-soft); font-style: italic; margin-top: 14px; line-height: 1.4; border-top: 1px dashed var(--rule); padding-top: 12px; }
  .controls { display: flex; gap: 10px; width: 100%; max-width: 360px; }
  .btn { flex: 1; padding: 13px; border-radius: 8px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: transform 0.1s ease, opacity 0.15s ease; }
  .btn:active { transform: scale(0.97); }
  .btn-tricky { background: var(--paper-card); border: 1.5px solid var(--red); color: var(--red); }
  .btn-known { background: var(--sage); color: #fff; }
  .btn-nav { background: var(--ink); color: var(--paper); }
  .btn-nav:disabled { opacity: 0.3; cursor: default; }
  .nav-row { display: flex; gap: 10px; width: 100%; max-width: 360px; margin-top: 10px; }
  .quiz-wrap { width: 100%; max-width: 360px; margin: 0 auto; }
  .quiz-q-no { font-size: 12px; color: var(--pencil); margin-bottom: 6px; }
  .quiz-prompt { background: var(--paper-card); border: 1px solid var(--rule); border-radius: 10px; padding: 22px; margin-bottom: 18px; box-shadow: 0 2px 0 var(--rule); }
  .quiz-prompt-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--pencil); margin-bottom: 8px; }
  .quiz-prompt-text { font-family: Georgia, serif; font-size: 22px; font-weight: 700; color: var(--ink); line-height: 1.3; }
  .choice {
    width: 100%; text-align: left; background: var(--paper-card); border: 1.5px solid var(--rule);
    border-radius: 9px; padding: 13px 16px; font-size: 14.5px; color: var(--ink);
    margin-bottom: 10px; cursor: pointer; transition: all 0.15s ease;
  }
  .choice:hover { border-color: var(--ink-soft); }
  .choice.correct { background: #EEF4EE; border-color: var(--sage); color: #2F4631; }
  .choice.wrong { background: #FBEAEA; border-color: var(--red); color: var(--red); }
  .choice:disabled { cursor: default; }
  .quiz-feedback { font-size: 13px; margin-top: 4px; margin-bottom: 14px; min-height: 18px; color: var(--sage); font-weight: 600; }
  .quiz-feedback.bad { color: var(--red); }
  .quiz-summary { text-align: center; padding: 30px 20px; }
  .quiz-summary .big { font-family: Georgia, serif; font-size: 52px; font-weight: 700; color: var(--red); }
  .quiz-summary .label { font-size: 13px; color: var(--pencil); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }
  .topic-list { width: 100%; }
  .topic-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 4px; border-bottom: 1px solid var(--rule); cursor: pointer; }
  .topic-row:hover .topic-name { color: var(--red); }
  .topic-name { font-size: 15px; font-weight: 600; color: var(--ink); }
  .topic-count { font-size: 12px; color: var(--pencil); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--pencil); font-size: 14px; }
  .back-link { text-align: left; margin-bottom: 14px; cursor: pointer; font-size: 13px; color: var(--pencil); background: none; border: none; padding: 0; }
  .reset-row { text-align: center; margin-top: 24px; }
  .reset-link { font-size: 11.5px; color: var(--pencil); background: none; border: none; text-decoration: underline; cursor: pointer; }
  @media (prefers-reduced-motion: reduce) { .card-flip, .btn, .choice { transition: none !important; } }
</style>

{w:"miserable",pos:"adj",m:"very unhappy",ex:"He felt miserable after losing the match.",batch:12,topic:"Feelings"},
{w:"mood",pos:"n",m:"the way someone feels at a particular time",ex:"She's in a good mood today.",batch:12,topic:"Feelings"},

{w:"motivation",pos:"n",m:"a reason for doing something; enthusiasm to act",ex:"He lost motivation after the injury.",batch:12,topic:"General"},
];

const seenKeys = new Set();
const ALL_WORDS = RAW_WORDS.filter((w) => {
  const key = w.w + w.batch;
  if (seenKeys.has(key)) return false;
  seenKeys.add(key);
  return true;
});

const BATCH_NUMBERS = [...new Set(ALL_WORDS.map((w) => w.batch))].sort((a, b) => a - b);
const TOPICS = [...new Set(ALL_WORDS.map((w) => w.topic))].sort();

const STORAGE_KEY = "wordfile-progress-v1";

/* ============ localStorage helpers (works offline, no server needed) ============ */
function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* ignore */ }
  return { known: {}, tricky: {}, lastBatch: 1 };
}
function saveProgress(progress) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  } catch (e) {
    console.error("Could not save progress", e);
  }
}

/* ============ Components ============ */
function Header({ knownCount, total }) {
  return (
    <div className="header">
      <div>
        <div className="brand">Word<span>file</span></div>
        <div className="tagline">B1 Vocabulary Trainer</div>
      </div>
      <div className="stat-pill">{knownCount} / {total} known</div>
    </div>
  );
}

function Tabs({ active, setActive }) {
  const tabs = [
    { id: "learn", label: "Learn" },
    { id: "quiz", label: "Quiz" },
    { id: "topics", label: "Topics" },
  ];
  return (
    <div className="tabs">
      {tabs.map((t) => (
        <div
          key={t.id}
          className={"tab" + (active === t.id ? " active" : "")}
          onClick={() => setActive(t.id)}
          role="button"
          tabIndex={0}
          onKeyDown={(e) => { if (e.key === "Enter") setActive(t.id); }}
        >
          {t.label}
        </div>
      ))}
    </div>
  );
}

function BatchSelector({ batches, currentBatch, setCurrentBatch, progress }) {
  return (
    <div className="batch-row">
      {batches.map((b) => {
        const wordsInBatch = ALL_WORDS.filter((w) => w.batch === b);
        const allKnown = wordsInBatch.every((w) => progress.known[w.w + w.batch]);
        return (
          <div
            key={b}
            className={"batch-chip" + (currentBatch === b ? " active" : "")}
            onClick={() => setCurrentBatch(b)}
            role="button"
            tabIndex={0}
          >
            Day {b}
            {allKnown && <span className="dot" />}
          </div>
        );
      })}
    </div>
  );
}

function Flashcards({ words, progress, onMark }) {
  const [index, setIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);

  useEffect(() => { setIndex(0); setFlipped(false); }, [words]);

  if (words.length === 0) {
    return <div className="empty-state">No words in this set yet.</div>;
  }

  const safeIndex = Math.min(index, words.length - 1);
  const word = words[safeIndex];
  const key = word.w + word.batch;
  const isKnown = !!progress.known[key];

  const goNext = () => { setFlipped(false); setIndex((i) => Math.min(i + 1, words.length - 1)); };
  const goPrev = () => { setFlipped(false); setIndex((i) => Math.max(i - 1, 0)); };

  return (
    <div className="card-zone">
      <div className="progress-line">
        <span>Card {safeIndex + 1} of {words.length}</span>
        <span>{isKnown ? "✓ Known" : "Tap card to flip"}</span>
      </div>
      <div className="progress-track">
        <div className="progress-fill" style={{ width: `${((safeIndex + 1) / words.length) * 100}%` }} />
      </div>
      <div className="card-scene">
        <div
          className={"card-flip" + (flipped ? " flipped" : "")}
          onClick={() => setFlipped((f) => !f)}
          role="button"
          tabIndex={0}
          onKeyDown={(e) => { if (e.key === "Enter") setFlipped((f) => !f); }}
        >
          <div className="card-face front">
            <div className="card-tab">{word.topic}</div>
            <div className="card-index-no">No. {ALL_WORDS.indexOf(word) + 1}</div>
            <div className="card-word">{word.w}</div>
            <div className="card-pos">{word.pos}</div>
            <div className="card-hint">Tap to reveal meaning</div>
          </div>
          <div className="card-face back">
            <div className="card-tab">{word.topic}</div>
            <div className="card-meaning-label">Meaning</div>
            <div className="card-meaning">{word.m}</div>
            <div className="card-example">"{word.ex}"</div>
          </div>
        </div>
      </div>
      <div className="controls">
        <button className="btn btn-tricky" onClick={() => onMark(key, "tricky")}>Still tricky</button>
        <button className="btn btn-known" onClick={() => { onMark(key, "known"); goNext(); }}>I know this</button>
      </div>
      <div className="nav-row">
        <button className="btn btn-nav" onClick={goPrev} disabled={safeIndex === 0}>← Previous</button>
        <button className="btn btn-nav" onClick={goNext} disabled={safeIndex === words.length - 1}>Next →</button>
      </div>
    </div>
  );
}

function buildQuizQuestions(words, allWords) {
  const shuffled = [...words].sort(() => Math.random() - 0.5);
  return shuffled.map((correct) => {
    const distractors = allWords
      .filter((w) => w.w !== correct.w)
      .sort(() => Math.random() - 0.5)
      .slice(0, 3)
      .map((w) => w.m);
    const options = [...distractors, correct.m].sort(() => Math.random() - 0.5);
    return { word: correct, options, answer: correct.m };
  });
}

function Quiz({ words, onMark }) {
  const [questions, setQuestions] = useState(() => buildQuizQuestions(words, ALL_WORDS));
  const [qIndex, setQIndex] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);

  useEffect(() => {
    setQuestions(buildQuizQuestions(words, ALL_WORDS));
    setQIndex(0); setSelected(null); setScore(0); setDone(false);
  }, [words]);

  if (words.length === 0) {
    return <div className="empty-state">No words in this set yet.</div>;
  }

  if (done) {
    return (
      <div className="quiz-wrap">
        <div className="quiz-summary">
          <div className="big">{score}/{questions.length}</div>
          <div className="label">Correct answers</div>
        </div>
        <button className="btn btn-nav" style={{ width: "100%" }} onClick={() => {
          setQuestions(buildQuizQuestions(words, ALL_WORDS));
          setQIndex(0); setSelected(null); setScore(0); setDone(false);
        }}>Try again</button>
      </div>
    );
  }

  const q = questions[qIndex];
  const key = q.word.w + q.word.batch;

  const handleSelect = (opt) => {
    if (selected) return;
    setSelected(opt);
    if (opt === q.answer) { setScore((s) => s + 1); onMark(key, "known"); }
    else { onMark(key, "tricky"); }
  };
  const handleNext = () => {
    if (qIndex + 1 >= questions.length) setDone(true);
    else { setQIndex((i) => i + 1); setSelected(null); }
  };

  return (
    <div className="quiz-wrap">
      <div className="quiz-q-no">Question {qIndex + 1} of {questions.length}</div>
      <div className="quiz-prompt">
        <div className="quiz-prompt-label">What does this word mean?</div>
        <div className="quiz-prompt-text">{q.word.w} <span style={{ fontSize: "14px", fontStyle: "italic", color: "#8B8680" }}>({q.word.pos})</span></div>
      </div>
      {q.options.map((opt, i) => {
        let cls = "choice";
        if (selected) {
          if (opt === q.answer) cls += " correct";
          else if (opt === selected) cls += " wrong";
        }
        return (
          <button key={i} className={cls} disabled={!!selected} onClick={() => handleSelect(opt)}>
            {opt}
          </button>
        );
      })}
      <div className={"quiz-feedback" + (selected && selected !== q.answer ? " bad" : "")}>
        {selected ? (selected === q.answer ? "Correct! Nicely done." : "Not quite — review the highlighted answer.") : "\u00A0"}
      </div>
      {selected && (
        <button className="btn btn-nav" style={{ width: "100%" }} onClick={handleNext}>
          {qIndex + 1 >= questions.length ? "See results" : "Next question →"}
        </button>
      )}
    </div>
  );
}

function TopicsView({ topics, onSelectTopic }) {
  return (
    <div className="topic-list">
      {topics.map((t) => {
        const count = ALL_WORDS.filter((w) => w.topic === t).length;
        return (
          <div key={t} className="topic-row" onClick={() => onSelectTopic(t)} role="button" tabIndex={0}>
            <span className="topic-name">{t}</span>
            <span className="topic-count">{count} words →</span>
          </div>
        );
      })}
    </div>
  );
}

function App() {
  const [activeTab, setActiveTab] = useState("learn");
  const [currentBatch, setCurrentBatch] = useState(1);
  const [selectedTopic, setSelectedTopic] = useState(null);
  const [progress, setProgress] = useState(() => loadProgress());

  useEffect(() => {
    if (progress.lastBatch) setCurrentBatch(progress.lastBatch);
    // eslint-disable-next-line
  }, []);

  const handleMark = useCallback((key, status) => {
    setProgress((prev) => {
      const next = { ...prev, known: { ...prev.known }, tricky: { ...prev.tricky } };
      if (status === "known") { next.known[key] = true; delete next.tricky[key]; }
      else { next.tricky[key] = true; delete next.known[key]; }
      saveProgress(next);
      return next;
    });
  }, []);

  const setCurrentBatchAndSave = useCallback((b) => {
    setCurrentBatch(b);
    setSelectedTopic(null);
    setProgress((prev) => {
      const next = { ...prev, lastBatch: b };
      saveProgress(next);
      return next;
    });
  }, []);

  const activeWords = useMemo(() => {
    if (activeTab === "topics" && selectedTopic) {
      return ALL_WORDS.filter((w) => w.topic === selectedTopic);
    }
    return ALL_WORDS.filter((w) => w.batch === currentBatch);
  }, [currentBatch, selectedTopic, activeTab]);

  const knownCount = Object.keys(progress.known).length;

  const handleReset = () => {
    if (window.confirm("Reset all your progress? This can't be undone.")) {
      const fresh = { known: {}, tricky: {}, lastBatch: 1 };
      setProgress(fresh);
      saveProgress(fresh);
      setCurrentBatch(1);
    }
  };

  return (
    <div className="app">
      <Header knownCount={knownCount} total={ALL_WORDS.length} />
      <Tabs active={activeTab} setActive={(t) => { setActiveTab(t); if (t !== "topics") setSelectedTopic(null); }} />

      {activeTab === "learn" && (
        <>
          <BatchSelector batches={BATCH_NUMBERS} currentBatch={currentBatch} setCurrentBatch={setCurrentBatchAndSave} progress={progress} />
          <Flashcards words={activeWords} progress={progress} onMark={handleMark} />
        </>
      )}

      {activeTab === "quiz" && (
        <>
          <BatchSelector batches={BATCH_NUMBERS} currentBatch={currentBatch} setCurrentBatch={setCurrentBatchAndSave} progress={progress} />
          <Quiz words={activeWords} onMark={handleMark} />
        </>
      )}

      {activeTab === "topics" && (
        selectedTopic ? (
          <>
            <button className="back-link" onClick={() => setSelectedTopic(null)}>← Back to topics</button>
            <Flashcards words={activeWords} progress={progress} onMark={handleMark} />
          </>
        ) : (
          <TopicsView topics={TOPICS} onSelectTopic={setSelectedTopic} />
        )
      )}

      <div className="reset-row">
        <button className="reset-link" onClick={handleReset}>Reset progress</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
